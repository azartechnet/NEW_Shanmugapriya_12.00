<!--Universal selector-->
<html>
    <head>
        <title></title>
    </head>
    <body>
        <h1>Universal selector</h1>
        <p>Universal selector is used to select all the elements in a document. It is represented by an asterisk (*).</p>
        <p>Example:</p>
        <style>
            * {
                color: red;
            }
        </style>
        <p>This text will be red because of the universal selector.</p>
    </body>
</html>
