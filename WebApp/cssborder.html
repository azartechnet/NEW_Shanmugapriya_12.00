<html>
    <head>
        <title>Css Border</title>
        <style>
            h1 {
             
                border-width: 5px;
                border-color: red;
                border-top: dashed green;
                border-right: dotted blue;
                border-bottom: double orange;
                border-left: groove purple;


            }
            h2 {
                border: 2px dashed green;
            }
            h3 {
                border: 2px dotted blue;
            }
            h4 {
                border: 2px double orange;
            }
        </style>
    </head>
    <body>
        <h1>Heading-1</h1>
        <h2>Heading-2</h2>
        <h3>Heading-3</h3>
        <h4>Heading-4</h4>
    </body>
</html>
