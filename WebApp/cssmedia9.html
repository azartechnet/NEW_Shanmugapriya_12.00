<!--Change Paragraph aligment-->
<style>
    p {
        text-align: left;
    }
    
    @media screen and (max-width: 600px) {
        p {
        text-align: center;
        }
    }
</style>
<body>
    <p>This paragraph will be left-aligned on larger screens and centered on smaller screens.</p>
</body>
