<!--Two Column to One Column-->
<style>
  .column {
    float: left;
    width: 50%;
  }

  @media screen and (max-width: 600px) {
    .column {
      width: 100%;
    }
  }
</style>
<body>
  <div class="column">
    <h2>Column 1</h2>
    <p>This is the first column.</p>
  </div>
  <div class="column">
    <h2>Column 2</h2>
    <p>This is the second column.</p>
  </div>
</body>
