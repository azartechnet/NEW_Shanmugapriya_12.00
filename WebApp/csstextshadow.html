<!--
  text-shadow: none | <color> <offset-x> <offset-y> <blur-radius>
    text-shadow: <color> <offset-x> <offset-y> <blur-radius>, <color> <offset-x> <offset-y> <blur-radius>, ...

-->
        <style>
    .container {
        width: 300px;
        border: 1px solid black;
    }
    .shadow1 {
        text-shadow: 2px 2px 5px gray;
    }
    .shadow2 {
        text-shadow: 4px 4px 10px rgba(0, 0, 255, 0.5);
    }
    .shadow3 {
        text-shadow: 1px 1px 3px red, -1px -1px 3px blue;
    }

        </style>
</head>
<body>
    <div class="container shadow1">
        <p>This text has a gray shadow.</p>
    </div>
    <div class="container shadow2">
        <p>This text has a blue shadow with some transparency.</p>
    </div>
    <div class="container shadow3">
        <p>This text has both red and blue shadows.</p>
    </div>
</body>
</html>
